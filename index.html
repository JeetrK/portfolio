<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stack Scroll Study</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="experience">
		<section class="stack-scroll" aria-label="Stacked div scroll effect">
			<div class="stack-pin">
				<div class="stack-stage" id="stack-stage">
					<div class="stack-card card-1" data-index="0">
						<div class="stack-card__label">div 01</div>
					</div>
					<div class="stack-card card-2" data-index="1">
						<div class="stack-card__label">div 02</div>
					</div>
					<div class="stack-card card-3" data-index="2">
						<div class="stack-card__label">div 03</div>
					</div>
					<div class="stack-card card-4" data-index="3">
						<div class="stack-card__label">div 04</div>
					</div>
					<div class="stack-card card-5" data-index="4">
						<div class="stack-card__label">div 05</div>
					</div>
					<div class="stack-card card-6" data-index="5">
						<div class="stack-card__label">div 06</div>
					</div>
					<div class="stack-card card-7" data-index="6">
						<div class="stack-card__label">div 07</div>
					</div>
					<div class="stack-card card-8" data-index="7">
						<div class="stack-card__label">div 08</div>
					</div>
				</div>
				<div class="stack-progress" aria-hidden="true">
					<span class="stack-progress__dot is-active"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
					<span class="stack-progress__dot"></span>
				</div>
			</div>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
