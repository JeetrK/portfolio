<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stack Scroll Study</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body class="is-intro-active">
	<div class="intro-screen" id="intro-screen" aria-hidden="true">
		<div class="intro-screen__halo"></div>
		<div class="intro-screen__grid"></div>
		<div class="intro-screen__beam intro-screen__beam--left"></div>
		<div class="intro-screen__beam intro-screen__beam--right"></div>
		<div class="intro-screen__inner">
			<p class="intro-screen__kicker">Portfolio</p>
			<h1 class="intro-screen__title" aria-label="Harrison Klein">
				<span class="intro-screen__word intro-screen__word--first">Harrison</span>
				<span class="intro-screen__word intro-screen__word--last">Klein</span>
			</h1>
		</div>
	</div>
	<header class="page-header home-header">
		<nav class="page-nav">
			<span class="nav-current">Home</span>
			<span class="nav-divider">/</span>
			<a href="showcase.html" class="nav-link">Showcase</a>
		</nav>
	</header>
	<main class="experience">
		<section class="stack-scroll" aria-label="Stacked div scroll effect">
			<div class="stack-pin">
				<div class="stack-stage" id="stack-stage"></div>
				<div class="stack-progress" id="stack-progress" aria-hidden="true"></div>
			</div>
		</section>
	</main>

	<script src="transitions.js"></script>
	<script src="script.js"></script>
</body>
</html>
